apiVersion: radix.equinor.com/v1
kind: RadixApplication
metadata:
  name: ${{values.appName}}
spec:
  build:
    useBuildKit: true
  environments:
    - name: dev
      build:
        from: main
  components:
    - name: webapp
      src: "."
      ports:
        - name: http
          port: 8000
      publicPort: http
